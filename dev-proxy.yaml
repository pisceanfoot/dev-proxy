# dev-proxy test configuration
# Run with: go run ./cmd/dev-proxy/ -config dev-proxy.yaml

# Log level: error (default, silent) | info (startup summary) | debug (per-request trace)
# log_level: error
log_level: debug

server:
  listen_ports: [8080, 8443]
  tls:
    enabled: true # aa
    # cert_file: ./certs/cert.pem   # omit to auto-generate a self-signed cert
    # key_file:  ./certs/key.pem
  redirect_http: false # http://localhost:8080 → https://localhost:8443

# Named upstream definitions — referenced by routes below.
# Upstream URLs (and other string values) support ${VAR} and ${VAR:-default}
# interpolation. Values are sourced from the OS environment and an optional
# .env file (default: .env in CWD, override with --env-file).
#
# Example .env:
#   API_V1_URL=http://localhost:3001
#   API_V2_URL=https://preprod.api.internal
#
# Quick environment switch (no config file change):
#   dev-proxy --env-file .env.preprod
upstreams:
  api-v1:
    url: ${API_V1_URL:-http://localhost:3001}
    rewrite_host: true
    insecure: false
  api-v2:
    url: ${API_V2_URL:-http://localhost:3002}
    rewrite_host: true
    insecure: false
  web:
    url: ${WEB_URL:-http://localhost:3003}
    rewrite_host: true

# Host-grouped routes — evaluated in order, first host match wins.
# Within a group, first path match wins. No fall-through between groups.
hosts:
  - match: "api.local"
    upstream: api-v1 # host-level default — routes without upstream inherit this
    routes:
      # Exact path — only /health, nothing else
      - path_exact: "/health"
        # inherits upstream: api-v1 from host

      # Regex path — /api/v1/... forwards to api-v1 with path rewrite
      - path_regex: "^/api/v1/"
        # inherits upstream: api-v1 from host
        upstream_path: "/v1" # /api/v1/users → forwarded as /v1/users

      # url_rewrite example — regex capture groups rewrite the path dynamically.
      # Incoming /api/v2/users → upstream receives /v2/users (capture group $1).
      # url_rewrite and upstream_path are mutually exclusive on a route.
      # - path_prefix: "/api/v2"
      #   upstream: api-v2
      #   url_rewrite:
      #     match: "^/api/v2/(.*)"
      #     replace: "/v2/$1"

      # Prefix path — /api/v2/... forwards to api-v2 (overrides host default)
      - path_prefix: "/api/v2"
        upstream: api-v2 # overrides host-level default
        upstream_path: "/v2" # /api/v2/orders → forwarded as /v2/orders

      # Catch-all for this host
      - path_prefix: "/"
        # inherits upstream: api-v1 from host

  - match: "*.local"
    routes:
      - path_prefix: "/"
        upstream: ${HTTPBUN_URL}

  - match: "*"
    a: |
      ssdee
      1111

      1111
    upstream: ${HTTPBUN_URL:-"https://httpbun.com"}
    rewrite_host: true # host-level default — inline-upstream routes without rewrite_host inherit this
    routes:
      # Inline URL — rewrite_host inherited from host level above (omit it here)
      - path_prefix: "/"
        cors_allow_origin: "*"
        url_rewrite:
          match: "^/get/api/v2/(.*)"
          replace: "/any/v2/$1"
