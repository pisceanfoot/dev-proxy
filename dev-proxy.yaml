# dev-proxy test configuration
# Run with: go run ./cmd/dev-proxy/ -config dev-proxy.yaml

# Log level: error (default, silent) | info (startup summary) | debug (per-request trace)
# log_level: error
log_level: debug

server:
  listen_ports: [8080, 8443]
  tls:
    enabled: true
    # cert_file: ./certs/cert.pem   # omit to auto-generate a self-signed cert
    # key_file:  ./certs/key.pem
  redirect_http: false # http://localhost:8080 → https://localhost:8443

# Named upstream definitions — referenced by routes below.
upstreams:
  api-v1:
    url: http://localhost:3001
    rewrite_host: true
    insecure: false
  api-v2:
    url: http://localhost:3002
    rewrite_host: true
    insecure: false
  web:
    url: http://localhost:3003
    rewrite_host: true

# Host-grouped routes — evaluated in order, first host match wins.
# Within a group, first path match wins. No fall-through between groups.
hosts:
  - match: "api.local"
    upstream: api-v1 # host-level default — routes without upstream inherit this
    routes:
      # Exact path — only /health, nothing else
      - path_exact: "/health"
        # inherits upstream: api-v1 from host

      # Regex path — /api/v1/... forwards to api-v1 with path rewrite
      - path_regex: "^/api/v1/"
        # inherits upstream: api-v1 from host
        upstream_path: "/v1" # /api/v1/users → forwarded as /v1/users

      # Prefix path — /api/v2/... forwards to api-v2 (overrides host default)
      - path_prefix: "/api/v2"
        upstream: api-v2 # overrides host-level default
        upstream_path: "/v2" # /api/v2/orders → forwarded as /v2/orders

      # Catch-all for this host
      - path_prefix: "/"
        # inherits upstream: api-v1 from host

  - match: "*.local"
    routes:
      - path_prefix: "/"
        upstream: web

  - match: "*"
    upstream: "https://www.baidu.com"
    routes:
      # Inline URL — backward-compatible syntax still works
      - path_prefix: "/"
        rewrite_host: true
